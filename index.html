<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金權政治揭密｜2016 立委政治獻金查詢</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        :root {
            --bg-dark-green: #0a1f15;
            --bg-burgundy: #4a0404;
            --gold-light: #fcf6ba;
            --gold-main: #d4af37;
            --gold-dark: #aa771c;
            --gold-gradient: linear-gradient(to bottom right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --text-ivory: #fdfaf6;
            --font-serif: 'Noto Serif TC', 'Playfair Display', serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark-green);
            background-image: radial-gradient(circle at center, #113624 0%, #0a1f15 100%);
            color: var(--text-ivory); font-family: var(--font-serif);
            line-height: 1.6; min-height: 100vh;
        }

        /* 浮誇的純金文字特效 */
        .text-gold {
            background: var(--gold-gradient);
            -webkit-background-clip: text; color: transparent;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        header {
            border-bottom: 3px solid var(--gold-main);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            padding: 20px 0; text-align: center;
            background: var(--bg-burgundy);
            background-image: linear-gradient(to right, #2a0202, #4a0404, #2a0202);
            cursor: pointer; position: sticky; top: 0; z-index: 100;
        }
        header h1 { margin: 0; font-size: 2.5rem; font-weight: 900; letter-spacing: 5px; }

        .btn-gold {
            background: var(--gold-gradient); color: #333;
            border: 2px solid #fff; padding: 12px 30px;
            font-size: 1.2rem; font-family: var(--font-serif); font-weight: bold;
            cursor: pointer;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.5), 0 5px 15px rgba(0,0,0,0.7);
            transition: transform 0.2s; text-transform: uppercase;
        }
        .btn-gold:hover { transform: scale(1.05); }

        .hero {
            text-align: center; padding: 60px 20px 40px;
            border-bottom: 2px dashed var(--gold-dark);
        }
        .hero h2 { font-size: 3.5rem; margin-bottom: 20px; margin-top: 0;}
        .hero p { font-size: 1.2rem; color: var(--gold-light); max-width: 750px; margin: 0 auto 40px auto; }

        .search-box { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-box input {
            width: 100%; max-width: 500px; padding: 15px; font-size: 1.2rem;
            border: 3px solid var(--gold-main); background: rgba(0, 0, 0, 0.6);
            color: var(--gold-light); font-family: var(--font-serif);
        }
        .search-box input:focus { outline: none; box-shadow: 0 0 15px var(--gold-main); }

        .examples { text-align: center; font-size: 0.9rem; color: #aaa; margin-bottom: 30px; }
        .examples span { color: var(--gold-main); cursor: pointer; text-decoration: underline; margin: 0 10px; }

        .file-upload-wrapper {
            text-align: center; margin-top: 20px; padding: 20px;
            border: 1px dotted var(--gold-dark); background: rgba(0,0,0,0.3);
            border-radius: 5px; max-width: 600px; margin: 0 auto;
        }
        .file-upload-wrapper input[type="file"] { color: var(--gold-light); cursor: pointer; }

        .section-title { text-align: center; font-size: 2rem; margin: 60px 0 30px; position: relative; }
        .section-title::before, .section-title::after { content: "♛"; color: var(--gold-main); margin: 0 15px; }

        /* 卡片設計 */
        .card-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px; padding-bottom: 60px; margin-top: 20px;
        }
        .card {
            background: rgba(10, 31, 21, 0.9); border: 4px solid var(--gold-main);
            border-image: var(--gold-gradient) 1; padding: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8); position: relative;
        }
        .card::after {
            content: ''; position: absolute; top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px solid var(--gold-dark); pointer-events: none;
        }
        .card h3 { font-size: 2rem; margin: 0 0 10px; border-bottom: 1px solid var(--gold-dark); padding-bottom: 10px; }
        .card .tag {
            background: var(--bg-burgundy); color: var(--gold-light);
            padding: 3px 8px; font-size: 0.8rem; border: 1px solid var(--gold-main);
            vertical-align: middle; margin-left: 10px;
        }
        .card .amount { font-size: 2.2rem; font-weight: 900; margin: 15px 0; }
        .card ul { list-style: none; padding: 0; font-size: 0.95rem; }
        .card ul li { display: flex; justify-content: space-between; border-bottom: 1px dotted #555; margin-bottom: 8px; }

        /* 統計大廳專用設計 */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px; }
        @media (max-width: 768px) { .stats-grid { grid-template-columns: 1fr; } }
        
        .stat-panel {
            background: rgba(0, 0, 0, 0.6); border: 2px solid var(--gold-dark);
            padding: 25px; box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        .stat-panel h3 { margin-top: 0; text-align: center; border-bottom: 1px dashed var(--gold-main); padding-bottom: 15px;}
        
        /* CSS 長條圖 */
        .bar-row { display: flex; align-items: center; margin-bottom: 15px; }
        .bar-label { width: 110px; text-align: right; padding-right: 15px; font-weight: bold; font-size: 0.95rem; line-height: 1.2;}
        .bar-track { flex: 1; background: #1a1a1a; height: 24px; border: 1px solid #444; position: relative; }
        .bar-fill { height: 100%; background: var(--gold-gradient); transition: width 1.5s ease-out; }
        .bar-value { width: 130px; text-align: left; padding-left: 15px; font-family: monospace; font-size: 1.1rem; color: var(--gold-light); font-weight: bold;}

        /* 黃金帳本排行榜 (Table) */
        .gold-table { width: 100%; border-collapse: collapse; background: rgba(10, 31, 21, 0.8); border: 3px solid var(--gold-main); }
        .gold-table th, .gold-table td { border: 1px solid var(--gold-dark); padding: 12px 10px; text-align: center; }
        .gold-table th { background: var(--bg-burgundy); color: var(--gold-light); font-size: 1.1rem; }
        .gold-table tr:nth-child(even) { background: rgba(0, 0, 0, 0.4); }
        .gold-table tr:hover { background: rgba(212, 175, 55, 0.2); }
        .rank-badge { 
            display: inline-block; width: 30px; height: 30px; background: var(--gold-gradient); 
            color: #000; border-radius: 50%; line-height: 30px; font-weight: 900; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .controls {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.5); border: 1px solid var(--gold-main);
            padding: 15px 25px; margin: 30px 0; flex-wrap: wrap; gap: 15px;
        }
        .controls select {
            background: var(--bg-dark-green); color: var(--gold-light);
            border: 1px solid var(--gold-main); padding: 8px 12px; font-family: var(--font-serif);
            font-size: 1rem;
        }

        .hidden { display: none !important; }
        .no-results { text-align: center; font-size: 1.5rem; padding: 50px; color: #aaa; grid-column: 1 / -1;}
    </style>

        let parsedData = [];
        let currentResults = [];

        // --- CSV 解析與資料清洗 ---
        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                let currentline = lines[i];
                if (!currentline.trim()) continue; // 略過空行
                let rowValues = [];
                let inQuotes = false;
                let val = '';
                for (let char of currentline) {
                    if (char === '"') { inQuotes = !inQuotes; } 
                    else if (char === ',' && !inQuotes) { rowValues.push(val); val = ''; } 
                    else { val += char; }
                }
                rowValues.push(val); 
                if(rowValues.length === headers.length) {
                    const obj = {};
                    headers.forEach((header, index) => {
                        let cleanVal = rowValues[index] ? rowValues[index].trim().replace(/^"|"$/g, '') : '0';
                        
                        // 【關鍵清洗】如果政黨欄位空白、是0，或是單純沒寫，強制轉為「無黨籍」
                        if (header === '推薦政黨' && (!cleanVal || cleanVal === '0')) {
                            cleanVal = '無黨籍';
                        }
                        obj[header] = cleanVal;
                    });
                    result.push(obj);
                }
            }
            return result;
        }

        function parseNumber(str) {
            if(!str) return 0;
            return parseInt(str.toString().replace(/,/g, ''), 10) || 0;
        }

        function formatCurrency(num) {
            return '$' + parseNumber(num).toLocaleString();
        }

        function extractRegion(rawRegion) {
            if (!rawRegion || rawRegion === '0') return '未知';
            if (rawRegion.includes('不分區')) return '不分區';
            if (rawRegion.includes('平地原住民')) return '平地原住民';
            if (rawRegion.includes('山地原住民')) return '山地原住民';
            return rawRegion.substring(0, 3); // 取得前三個字，如：台北市、新北市
        }

        // --- 畫面切換 ---
        function showLandingPage() {
            document.getElementById('landing-page').classList.remove('hidden');
            document.getElementById('results-page').classList.add('hidden');
        }

        function showResultsPage() {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('results-page').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        // --- 統計中心 (動態生成) ---
        function updateDashboard() {
            if (!parsedData || parsedData.length === 0) return;

            const partyMap = {};
            const regionMap = {};

            parsedData.forEach(item => {
                const totalMoney = parseNumber(item['總收入']);
                if (totalMoney <= 0) return; // 沒吸到金的先跳過

                const party = item['推薦政黨'];
                const region = extractRegion(item['地區']);

                partyMap[party] = (partyMap[party] || 0) + totalMoney;
                regionMap[region] = (regionMap[region] || 0) + totalMoney;
            });

            // 排序並取 Top 5
            const partyArr = Object.entries(partyMap).sort((a,b) => b[1] - a[1]).slice(0, 5);
            const regionArr = Object.entries(regionMap).sort((a,b) => b[1] - a[1]).slice(0, 5);

            // 排行榜 Top 10
            const top10Individuals = [...parsedData].sort((a,b) => parseNumber(b['總收入']) - parseNumber(a['總收入'])).slice(0, 10);

            // 觸發渲染動畫（用 setTimeout 確保 DOM 更新）
            setTimeout(() => {
                renderBarChart('party-chart-container', partyArr);
                renderBarChart('region-chart-container', regionArr);
            }, 50);
            
            renderLeaderboard(top10Individuals);
        }

        function renderBarChart(containerId, dataArr) {

                return;
            }

            let html = '';

            dataArr.forEach(item => {
                const label = item[0];
                const value = item[1];
                const percentage = Math.max((value / maxVal) * 100, 1); // 至少 1% 寬度
                
                html += `
                    <div class="bar-row">
                        <div class="bar-label">${label}</div>
                        <div class="bar-track">
                            <div class="bar-fill" style="width: 0%;" data-target="${percentage}%"></div>
                        </div>
                        <div class="bar-value">${formatCurrency(value)}</div>
                    </div>
                `;
            });
            container.innerHTML = html;

            // 執行 CSS 動畫，讓長條圖滑順延伸
            setTimeout(() => {
                container.querySelectorAll('.bar-fill').forEach(bar => {
                    bar.style.width = bar.getAttribute('data-target');
                });
            }, 100);
        }

        function renderLeaderboard(top10Arr) {
            const tbody = document.getElementById('leaderboard-body');
            let html = '';

            top10Arr.forEach((item, index) => {
                const rankNum = index + 1;
                let rankDisplay = `<span class="rank-badge">${rankNum}</span>`;
                if (rankNum === 1) rankDisplay = `👑<br><span class="rank-badge" style="background:#fff;">1</span>`;
                if (rankNum === 2) rankDisplay = `<span class="rank-badge" style="background:#c0c0c0;">2</span>`;
                if (rankNum === 3) rankDisplay = `<span class="rank-badge" style="background:#cd7f32;">3</span>`;

                const isElected = item['當選註記'] === '*' ? '<span class="tag" style="padding:2px 5px; font-size:0.7rem; margin-left:5px;">當選</span>' : '';

                html += `
                    <tr>
                        <td>${rankDisplay}</td>
                        <td style="font-size:1.2rem; font-weight:bold; color:var(--gold-light);">
                            <span style="cursor:pointer; text-decoration:underline;" onclick="triggerSearch('${item['姓名']}')">${item['姓名']}</span>
                            ${isElected}
                        </td>
                        <td>${item['推薦政黨']}</td>
                        <td>${extractRegion(item['地區'])}</td>
                        <td class="text-gold" style="font-size:1.3rem; font-weight:900;">${formatCurrency(item['總收入'])}</td>
                        <td>${formatCurrency(item['營利事業捐贈收入'])} <br><small style="color:#aaa;">(${item['營利事業捐贈比例']})</small></td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // --- 搜尋與結果列表渲染 ---
        function triggerSearch(keyword) {
            document.getElementById('search-input-main').value = keyword;
            document.getElementById('search-form-main').dispatchEvent(new Event('submit'));
        }

        function handleSearch(event, source) {
            event.preventDefault();
            const query = document.getElementById(`search-input-${source}`).value.trim().toLowerCase();
            if (!query) return;

            document.getElementById('search-input-main').value = query;
            document.getElementById('search-input-results').value = query;

            // 支援姓名、政黨、地區模糊搜尋
            currentResults = parsedData.filter(item => {
                const name = (item['姓名'] || '').toLowerCase();
                const party = (item['推薦政黨'] || '').toLowerCase();
                const district = (item['地區'] || '').toLowerCase();
                return name.includes(query) || party.includes(query) || district.includes(query);
            });

            applySort(); 
            showResultsPage();
        }

        function applySort() {
            const sortMethod = document.getElementById('sort-select').value;
            
            currentResults.sort((a, b) => {
                if (sortMethod === 'total_desc') return parseNumber(b['總收入']) - parseNumber(a['總收入']);
                if (sortMethod === 'corp_desc') return parseNumber(b['營利事業捐贈收入']) - parseNumber(a['營利事業捐贈收入']);
                if (sortMethod === 'corp_count_desc') return parseNumber(b['捐贈企業數']) - parseNumber(a['捐贈企業數']);
                return 0;
            });

            renderResults();
        }

        function renderResults() {
            const grid = document.getElementById('results-grid');
            const summary = document.getElementById('result-summary');

            if (currentResults.length === 0) {
                grid.innerHTML = '<div class="no-results">找不到符合條件的權貴，可能藏得太深了。</div>';
                summary.innerHTML = `找到 <strong class="text-gold" style="font-size:1.5rem;">0</strong> 名政治人物`;
                return;
            }

            const totalMoney = currentResults.reduce((sum, item) => sum + parseNumber(item['總收入']), 0);

            summary.innerHTML = `
                搜尋結果：共找到 <strong class="text-gold" style="font-size:1.5rem;">${currentResults.length}</strong> 名政治人物，
                獻金總額高達 <strong class="text-gold" style="font-size:1.5rem;">$${totalMoney.toLocaleString()}</strong> 元
            `;

            grid.innerHTML = currentResults.map(item => {
                const isElected = item['當選註記'] === '*' ? '<span class="tag">當選</span>' : '';
                return `
                    <div class="card">
                        <h3>${item['姓名']} ${isElected}</h3>
                        <p style="margin:0 0 10px; color:#aaa;">${item['地區']} | ${item['推薦政黨']}</p>
                        <div class="amount text-gold">${formatCurrency(item['總收入'])}</div>
                        <ul>
                            <li><span>捐贈企業數：</span> <span>${item['捐贈企業數']} 家</span></li>
                            <li><span>個人捐贈：</span> <span>${formatCurrency(item['個人捐贈收入'])} (${item['個人捐贈比例']})</span></li>
                            <li><span>營利事業捐贈：</span> <span class="text-gold">${formatCurrency(item['營利事業捐贈收入'])} (${item['營利事業捐贈比例']})</span></li>
                            <li><span>人民團體捐贈：</span> <span>${formatCurrency(item['人民團體捐贈收入'])} (${item['人民團體收入比例']})</span></li>
                            <li><span>總支出金額：</span> <span>${formatCurrency(item['總支出'])}</span></li>
                        </ul>
                    </div>
                `;
            }).join('');
        }

        // --- 手動上傳與自動載入機制 ---
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                parsedData = parseCSV(e.target.result);
                document.getElementById('upload-status').innerHTML = `✅ 手動載入成功！分析 <strong class="text-gold">${parsedData.length}</strong> 筆資料。`;
                updateDashboard();
            };
            reader.readAsText(file);
        }

        window.onload = async function() {
            const statusDiv = document.getElementById('upload-status');
            const wrapperDiv = document.getElementById('upload-wrapper');

            try {
                // 嘗試在同目錄下抓取完整的 CSV 檔案 (透過 Local Server 執行時生效)
                const response = await fetch('2016.csv.csv');
                if (response.ok) {
                    const csvText = await response.text();
                    parsedData = parseCSV(csvText);
                    // 成功抓到就隱藏上傳區塊，讓畫面更乾淨
                    wrapperDiv.style.display = 'none';
                    console.log('自動載入 2016.csv.csv 成功');
                } else {
                    throw new Error('找不到檔案，或是在禁止本地 fetch 的環境');
                }
            } catch (error) {
                // 若找不到或被阻擋（如在目前的預覽環境），退回使用預設強化的展示資料
                parsedData = parseCSV(defaultCsvData);
                statusDiv.innerHTML = `⚠️ 目前使用「精華版展示資料」。若要查看完整數據，請透過上方上傳您的 2016.csv 帳本！`;
            }
            updateDashboard();
        };
    </script>
</body>
</html>
